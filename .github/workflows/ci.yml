name: Odoo CI

on:
    workflow_dispatch:

    pull_request:
        branches:
            - main
        paths:
            - "**/*.py"
            - "**/*.xml"
            - "**/*.csv"
            - "static/src/**/*.js"
            - "static/src/**/*.scss"
            - "static/tests/**/*.js"
            - "__manifest__.py"
            - "pyproject.toml"
            - ".pre-commit-config.yaml"
            - "docker-compose.yaml"
            - ".github/workflows/ci.yml"

    push:
        branches:
            - main
        paths:
            - "**/*.py"
            - "**/*.xml"
            - "**/*.csv"
            - "static/src/**/*.js"
            - "static/src/**/*.scss"
            - "static/tests/**/*.js"
            - "__manifest__.py"
            - "pyproject.toml"
            - ".pre-commit-config.yaml"
            - "docker-compose.yaml"
            - ".github/workflows/ci.yml"

permissions:
    contents: read
    pull-requests: read

env:
    PYTHON_VERSION: "3.14"
    MODULE_NAME: abc_crm
    TEST_DB: abc_crm_test

concurrency:
    group: odoo-ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Code Quality
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ env.PYTHON_VERSION }}

            - name: Restore pre-commit environments
              uses: actions/cache@v4
              with:
                  path: ~/.cache/pre-commit
                  key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml', 'pyproject.toml') }}

            - name: Install linting tools
              run: |
                  python -m pip install --upgrade pip
                  pip install pre-commit pylint pylint-odoo

            - name: Run pre-commit checks
              run: |
                  pre-commit run --all-files

            - name: Pylint Odoo check
              continue-on-error: true
              run: |
                  pylint . \
                    --load-plugins=pylint_odoo \
                    --disable=all \
                    --enable=odoolint

    test:
        name: Odoo Module Tests
        runs-on: ubuntu-latest
        needs: lint
        timeout-minutes: 25

        services:
            postgres:
                image: postgres:18
                env:
                    POSTGRES_USER: odoo
                    POSTGRES_PASSWORD: odoo
                    POSTGRES_DB: postgres
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U odoo -d postgres"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Create CI Odoo config
              run: |
                  cat > odoo-ci.conf <<'EOF'
                  [options]
                  db_host = 127.0.0.1
                  db_port = 5432
                  db_user = odoo
                  db_password = odoo
                  addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
                  data_dir = /var/lib/odoo
                  logfile = False
                  EOF

            - name: Run abc_crm tests
              run: |
                  docker run --rm --network host \
                    -e HOST=127.0.0.1 \
                    -e PORT=5432 \
                    -e USER=odoo \
                    -e PASSWORD=odoo \
                    -v "$PWD:/mnt/extra-addons/$MODULE_NAME:ro" \
                    -v "$PWD/odoo-ci.conf:/etc/odoo/odoo-ci.conf:ro" \
                    odoo:19.0 \
                    odoo \
                    -c /etc/odoo/odoo-ci.conf \
                    --db_host=127.0.0.1 \
                    --db_port=5432 \
                    --db_user=odoo \
                    --db_password=odoo \
                    --database=$TEST_DB \
                    --init=$MODULE_NAME \
                    --test-enable \
                    --test-tags=/$MODULE_NAME \
                    --stop-after-init \
                    --log-level=test
